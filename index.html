<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glow Diary - Iniciar Sesion 🌸</title>

    <!--Llamamos al archivo externo con los estilos-->
    <link rel="stylesheet" href="css/estilos.css">

    <!-- Fuente elegante de Google Fonts para el toque estético -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..700;1,400..700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div class="login-container">
        <!--encabezado del login-->
        <div class="login-header">
            <h1>Glow Diary</h1>
            <p>Tu espacio de calma y cuidado diario ✨</p>
        </div>
        <!--Formulario de entrada-->
        <form class="login-form">
            <div class="input-group">
                <label for="email">Correro Electronico</label>
                <input type="email" id="email" placeholder="ejemplo@correo.com" required>
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="pass12345" required>
            </div>

            <button type="submit" class="btn-login">Entrar a mi tocador</button>
        </form>
        <div class="login-footer">
            <p>No tienes una cuenta <a href="#">Registrate aqui</a></p>
        </div>
    </div>

    <!-- Importamos la librería de Supabase tal cual como en AI Automate -->
    <script type="module" src="login.js"></script>

    
</body>
</html>
